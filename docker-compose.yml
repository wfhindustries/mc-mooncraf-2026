services:
  mc:
    image: itzg/minecraft-server:java21
    container_name: mc_server
    tty: true
    stdin_open: true
    environment:
      EULA: "true"
      VERSION: "1.21.1"
      TYPE: NEOFORGE

      # — Identity —
      MOTD: "and we're playing minecraft"
      ICON: "https://i.imgur.com/m7JSRql.png"
      LEVEL: "world"

      # — Access —
      OPS: "${OPS:?set OPS in .env}"
      RCON_PASSWORD: "${RCON_PASSWORD:?set RCON_PASSWORD in .env}"
      SERVER_PORT: 25565
      RCON_PORT: 25576

      # — Performance (8 GB host RAM; 6 G allocated to JVM) —
      MEMORY: 6G
      USE_AIKAR_FLAGS: "true"
      JVM_XX_OPTS: "-XX:ActiveProcessorCount=3"
      MAX_TICK_TIME: "-1"
      VIEW_DISTANCE: 12
      SIMULATION_DISTANCE: 6
      ENABLE_ROLLING_LOGS: "true"

      # — Mods (auto-downloaded from Modrinth on first start) —
      # MODRINTH_DOWNLOAD_DEPENDENCIES: required pulls hard deps automatically.
      # Add or remove slugs freely; pin a version with slug:version-id if needed.
      MODRINTH_DOWNLOAD_DEPENDENCIES: required
      REMOVE_OLD_MODS: "true"
      MODRINTH_PROJECTS: |-
        appleskin
        attributefix
        bellsandwhistles
        carry-on
        chunky
        clumps
        cobblefurnies
        cobblemon
        cobblemon-fight-or-flight-reborn
        cobblemonextras
        create
        createaddition
        create-connected
        create-deco
        ferrite-core
        gravestone-mod
        interiors
        jade
        jei:beta
        lithium
        lootr
        modernfix
        more-cobblemon-tweaks
        no-chat-reports
        noisium
        simple-voice-chat
        sophisticated-backpacks
        spark
        structure-layout-optimizer
        supplementaries
        supplementaries-squared
        terralith
        toms-storage
        easy-tpa
        waystones
        xaeros-world-map
        xaeros-minimap

      # — CurseForge mods (requires CF_API_KEY in .env) —
      CF_API_KEY: "${CF_API_KEY:?set CF_API_KEY in .env}"
      CURSEFORGE_FILES: |-
        cobblemon-capture-xp
        cobblemon-integrations
        cobblemon-playerxp
        cobblemon-safepastures
        create-cobblemon-balls-overhaul
        radical-cobblemon-trainers-api
        rctmod

      # — Datapacks (Fabric-only mods that ship as server-side datapacks) —
      MODRINTH_DATAPACKS: |-
        cobblemon-additions

    ports:
      - "25565:25565"
      - "25576:25576"
      - "24454:24454/udp"
    volumes:
      - ./data:/data
    restart: unless-stopped

  backups:
    image: itzg/mc-backup
    depends_on:
      mc:
        condition: service_healthy
    environment:
      BACKUP_METHOD: "restic"
      RESTIC_REPOSITORY: "${RESTIC_REPOSITORY:?set RESTIC_REPOSITORY in .env}"
      RESTIC_PASSWORD: "${RESTIC_PASSWORD:?set RESTIC_PASSWORD in .env}"
      # RESTIC_HOSTNAME: mc_server
      RESTIC_ADDITIONAL_TAGS: mc_backups world backups neoforge  # Customize tags for filtering
      # PRUNE_RESTIC_RETENTION: # Optional, set your retention policy (see Restic docs)

      RCON_HOST: mc
      RCON_PASSWORD: "${RCON_PASSWORD:?set RCON_PASSWORD in .env}"
      # since this service waits for mc to be healthy, no initial delay is needed
      # INITIAL_DELAY: 0

      # Backup Interval
      BACKUP_INTERVAL: "3h"

      # S3 Configuration for Vultr
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID in .env}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in .env}"
      S3_ENDPOINT: "${S3_ENDPOINT:?set S3_ENDPOINT in .env}"
    volumes:
      - ./data:/data:ro
